<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio | Suraj</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <header>
      <nav class="nav-bar">
        <a href="/" class="nav-link">Hub</a>
        <a href="/portfolio" class="nav-link">Portfolio</a>
        <a href="/personal" class="nav-link">Personal</a>
      </nav>
    </header>

    <main id="app-content">
      <div class="section">
        <h2 class="sub-section-title">🚀 Projects</h2>
        <div id="projects-grid" class="projects-list">
          <!-- Projects from D1 are rendered here -->
        </div>

        <div class="form-card">
          <h3 class="form-title">Add a Project</h3>
          <form id="project-form">
            <div class="form-group">
              <label class="form-label" for="name">Project Name</label>
              <input type="text" id="name" class="form-input" placeholder="e.g. CodeAudit AI" required />
            </div>
            <div class="form-group">
              <label class="form-label" for="status">Status</label>
              <input type="text" id="status" class="form-input" placeholder="e.g. Active or In-Progress" required />
            </div>
            <button type="submit" class="form-submit-btn">Add Project</button>
          </form>
        </div>

        <div class="section" style="margin-top: 40px;">
          <h2 class="sub-section-title">📂 Case Studies & Work Posts</h2>
          <div id="work-posts-list" class="posts-feed">
            <!-- Work posts from D1 are rendered here -->
          </div>
        </div>
      </div>
    </main>

    <script src="/router.js"></script>
  </body>
</html>
